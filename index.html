<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音声メモの録音・AI要約・Obsidian連携</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    [v-cloak] { display: none; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

  <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="text-lg font-bold tracking-tight flex items-center gap-2">
        <i class="fa-solid fa-microphone-lines"></i> 音声メモの録音・AI要約・Obsidian連携
      </h1>
      <nav id="main-nav" class="hidden md:flex gap-4 items-center text-sm">
        <button onclick="switchTab('tab-memo')" class="nav-item hover:bg-indigo-700 px-3 py-1.5 rounded transition">音声メモ</button>
        <button onclick="switchTab('tab-timeline')" class="nav-item hover:bg-indigo-700 px-3 py-1.5 rounded transition">タイムライン</button>
        <button onclick="switchTab('tab-profile')" class="nav-item hover:bg-indigo-700 px-3 py-1.5 rounded transition">マイページ</button>
        <button id="nav-admin" onclick="switchTab('tab-admin')" class="nav-item hover:bg-indigo-700 px-3 py-1.5 rounded transition hidden">管理者メニュー</button>
        <span id="user-display" class="text-indigo-200 font-medium ml-2"></span>
        <button onclick="logout()" class="text-xs bg-indigo-700 hover:bg-indigo-800 px-2 py-1 rounded transition ml-2">ログアウト</button>
      </nav>
    </div>
  </header>

  <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-3">
          <i class="fa-solid fa-microphone-lines"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900">システムログイン</h2>
        <p class="text-sm text-gray-500 mt-1">音声要約アプリへようこそ</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-700 uppercase mb-1">メールアドレス</label>
          <input type="email" id="login-email" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:border-indigo-500 transition" placeholder="your@email.com">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-700 uppercase mb-1">パスワード</label>
          <div class="relative">
            <input type="password" id="login-password" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:border-indigo-500 transition pr-10" placeholder="••••••••">
            <button type="button" onclick="togglePasswordVisibility('login-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i class="fa-solid fa-eye" id="login-password-eye"></i>
            </button>
          </div>
        </div>
        <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-3 rounded-xl shadow-lg shadow-indigo-100 transition mt-2">ログイン</button>
      </div>
    </div>
  </div>

  <main id="main-content" class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 hidden">
    
    <div id="tab-memo" class="tab-content active space-y-6">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between min-h-[320px]">
          <div>
            <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
              <i class="fa-solid fa-circle-dot text-red-500 animate-pulse"></i> 録音コントロール
            </h3>
            <p class="text-sm text-gray-500 mb-6">マイクに向かって話し、終了後にAI要約を生成します。</p>
          </div>

          <div class="flex flex-col items-center justify-center my-auto space-y-4">
            <button id="btn-record" onclick="toggleRecording()" class="w-24 h-24 rounded-full bg-red-500 hover:bg-red-600 text-white flex items-center justify-center text-3xl shadow-lg shadow-red-100 transition-all transform hover:scale-105 outline-none">
              <i id="icon-record" class="fa-solid fa-microphone"></i>
            </button>
            <div id="recording-status" class="text-sm font-medium text-gray-500">停止中</div>
            <div id="recording-timer" class="text-2xl font-mono font-bold text-gray-700 hidden">00:00</div>
          </div>

          <div class="text-center text-xs text-gray-400 mt-4">
            ※ 録音内容はブラウザに一時的に保持されます
          </div>
        </div>

        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col space-y-4">
          <div class="flex justify-between items-center">
            <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2">
              <i class="fa-solid fa-file-invoice text-indigo-500"></i> 要約・文字起こし結果
            </h3>
            <button onclick="clearMemo()" class="text-xs text-gray-400 hover:text-red-500 flex items-center gap-1 transition">
              <i class="fa-solid fa-trash-can"></i> リセット
            </button>
          </div>

          <div class="flex-1 space-y-4">
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">AI要約テキスト</label>
              <textarea id="memo-summary-text" class="w-full h-48 border border-gray-100 p-4 rounded-xl bg-gray-50 text-gray-700 outline-none focus:border-indigo-300 focus:bg-white transition resize-none text-sm leading-relaxed" placeholder="録音終了後に自動でAI要約がここに生成されます..."></textarea>
            </div>
          </div>

          <div id="obsidian-area" class="mt-4 p-4 bg-indigo-50 rounded-xl border border-indigo-100 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="w-full sm:w-1/4">
              <label class="block text-xs font-bold text-indigo-700 uppercase mb-1">Obsidian Vault名 (任意)</label>
              <input type="text" id="obsidian-vaultname" value="健二保管庫" placeholder="空欄で起動中のVaultを使用" class="w-full border border-indigo-200 px-3 py-1.5 rounded-md text-sm outline-none focus:border-indigo-500 bg-white">
            </div>
            <div class="w-full sm:w-1/3">
              <label class="block text-xs font-bold text-indigo-700 uppercase mb-1">Obsidian 保存ノート名</label>
              <input type="text" id="obsidian-filename" value="" placeholder="例: memo202606200858" class="w-full border border-indigo-200 px-3 py-1.5 rounded-md text-sm outline-none focus:border-indigo-500 bg-white">
            </div>
            <div class="flex gap-2 w-full sm:w-auto justify-end">
              <button onclick="sendToObsidian('new')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-xs px-4 py-2.5 rounded-lg shadow-sm transition whitespace-nowrap">新規ノート作成</button>
              <button onclick="sendToObsidian('append')" class="bg-white hover:bg-indigo-100 text-indigo-600 border border-indigo-200 font-medium text-xs px-4 py-2.5 rounded-lg shadow-sm transition whitespace-nowrap">末尾に追記</button>
            </div>
          </div>

        </div>
      </div>
    </div>

    <div id="tab-timeline" class="tab-content space-y-4">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-gray-900">イベントタイムライン</h2>
        <button id="btn-add-event" onclick="openEventForm()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm px-4 py-2 rounded-xl shadow transition hidden">
          <i class="fa-solid fa-plus mr-1"></i> 新規イベント
        </button>
      </div>

      <div id="event-form-container" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4 hidden">
        <h3 id="event-form-title" class="text-lg font-bold text-gray-900">新規イベント作成</h3>
        <input type="hidden" id="event-id">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">タイトル</label>
            <input type="text" id="event-title" class="w-full border border-gray-200 p-2 rounded-xl outline-none">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">内容・説明</label>
            <input type="text" id="event-desc" class="w-full border border-gray-200 p-2 rounded-xl outline-none">
          </div>
        </div>
        <div class="flex justify-end gap-2">
          <button onclick="closeEventForm()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-xl text-sm font-medium transition">キャンセル</button>
          <button onclick="saveEvent()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition">保存する</button>
        </div>
      </div>

      <div id="timeline-container" class="space-y-4">
        <p class="text-center text-gray-400 py-12">タイムラインを読み込み中...</p>
      </div>
    </div>

    <div id="tab-profile" class="tab-content max-w-xl mx-auto space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
        <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
          <i class="fa-solid fa-user-gear text-indigo-500"></i> ユーザー情報の設定
        </h2>
        <div>
          <label class="block text-xs font-bold text-gray-700 uppercase mb-1">会員番号 (メールアドレス)</label>
          <input type="text" id="profile-email" disabled class="w-full bg-gray-100 border border-gray-200 p-2.5 rounded-xl text-gray-500 cursor-not-allowed">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-700 uppercase mb-1">ニックネーム</label>
          <input type="text" id="profile-nickname" class="w-full border border-gray-200 p-2.5 rounded-xl outline-none focus:border-indigo-500 transition">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-700 uppercase mb-1">連絡用SNS (任意)</label>
          <input type="text" id="profile-sns" placeholder="LINE ID, X（旧Twitter）アカウント等" class="w-full border border-gray-200 p-2.5 rounded-xl outline-none focus:border-indigo-500 transition">
        </div>
        <button onclick="handleUpdateProfile()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-2.5 rounded-xl shadow transition">ユーザー情報を更新</button>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
        <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
          <i class="fa-solid fa-key text-indigo-500"></i> パスワードの変更
        </h2>
        <p class="text-xs text-gray-500">いつでも好きなタイミングでパスワードを変更できます。</p>
        <div>
          <label class="block text-xs font-bold text-gray-700 uppercase mb-1">新しいパスワード</label>
          <div class="relative">
            <input type="password" id="profile-new-password" class="w-full border border-gray-200 p-2.5 rounded-xl outline-none focus:border-indigo-500 transition pr-10">
            <button type="button" onclick="togglePasswordVisibility('profile-new-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i class="fa-solid fa-eye" id="profile-new-password-eye"></i>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-700 uppercase mb-1">新しいパスワード (確認)</label>
          <div class="relative">
            <input type="password" id="profile-new-password-confirm" class="w-full border border-gray-200 p-2.5 rounded-xl outline-none focus:border-indigo-500 transition pr-10">
            <button type="button" onclick="togglePasswordVisibility('profile-new-password-confirm')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i class="fa-solid fa-eye" id="profile-new-password-confirm-eye"></i>
            </button>
          </div>
        </div>
        <button onclick="handleChangePassword()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold p-2.5 rounded-xl shadow transition">パスワードを変更</button>
      </div>
    </div>

    <div id="tab-admin" class="tab-content space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-bold text-gray-900 mb-4">アカウント新規発行</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">メールアドレス</label>
            <input type="email" id="admin-new-email" class="w-full border border-gray-200 p-2.5 rounded-xl outline-none">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">ニックネーム</label>
            <input type="text" id="admin-new-nickname" class="w-full border border-gray-200 p-2.5 rounded-xl outline-none">
          </div>
          <div>
            <button onclick="createUserAccount()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-2.5 rounded-xl shadow transition">アカウント作成</button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <div id="toast" class="fixed bottom-5 right-5 px-5 py-3 rounded-xl shadow-xl text-white font-medium transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2"></div>

  <script>
    // GASのWebアプリURL（実際のURLに書き換えてください）
    const GAS_WEB_URL = "https://script.google.com/macros/s/.../exec";

    let currentUser = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let recordingTimerInterval = null;
    let recordingStartTime = null;

    // ロード時にローカルストレージを確認
    window.addEventListener('DOMContentLoaded', () => {
      const savedUser = localStorage.getItem('voice_memo_user');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        showMainApp();
      }
      autoFillObsidianFilename();
    });

    // APIコール共通関数
    async function apiCall(data) {
      // 開発・テスト用にGAS連携部分をモック（本来はfetchを使用）
      console.log("API Call:", data);
      return new Promise((resolve) => {
        setTimeout(() => {
          if (data.action === 'login') {
            if (data.email === 'admin@test.com') {
              resolve({ success: true, email: data.email, nickname: '管理者ケンジ', sns: '', isAdmin: true });
            } else {
              resolve({ success: true, email: data.email, nickname: '一般ユーザー', sns: '', isAdmin: false });
            }
          } else if (data.action === 'fetchEvents') {
            resolve({ success: true, events: [
              { id: '1', title: '音声システム説明会', desc: '新機能の使い方を解説します。', creator: 'admin@test.com', nickname: '管理者ケンジ', createdAt: new Date().toISOString(), participants: [
                { nickname: '一般ユーザー', sns: '' }
              ] }
            ]});
          } else if (data.action === 'toggleJoin') {
            resolve({ success: true, joined: true });
          } else if (data.action === 'updateProfile') {
            resolve({ success: true, nickname: data.nickname, sns: data.sns });
          } else if (data.action === 'changePassword') {
            resolve({ success: true });
          } else {
            resolve({ success: true });
          }
        }, 600);
      });
    }

    // 認証関連
    async function login() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if(!email || !password) { showAlert('すべて入力してください。', 'error'); return; }
      
      try {
        const res = await apiCall({ action: 'login', email, password });
        if(res.success) {
          currentUser = res;
          localStorage.setItem('voice_memo_user', JSON.stringify(currentUser));
          showAlert('ログインしました！');
          showMainApp();
        } else {
          showAlert('認証に失敗しました。', 'error');
        }
      } catch(e) { showAlert('ログイン処理に失敗しました。', 'error'); }
    }

    function togglePasswordVisibility(inputId) {
      const input = document.getElementById(inputId);
      const eye = document.getElementById(inputId + '-eye');
      if (input.type === 'password') {
        input.type = 'text'; eye.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password'; eye.className = 'fa-solid fa-eye';
      }
    }

    // ユーザー情報（ニックネーム・SNS）の更新
    async function handleUpdateProfile() {
      const nickname = document.getElementById('profile-nickname').value.trim();
      const sns = document.getElementById('profile-sns').value.trim();
      if(!nickname) { showAlert('ニックネームを入力してください。', 'error'); return; }

      try {
        const res = await apiCall({ action: 'updateProfile', email: currentUser.email, nickname, sns });
        if(res.success) {
          currentUser.nickname = nickname;
          currentUser.sns = sns;
          localStorage.setItem('voice_memo_user', JSON.stringify(currentUser));
          document.getElementById('user-display').innerText = currentUser.nickname;
          showAlert('ユーザー情報を更新しました。');
        } else {
          showAlert(res.message || '更新に失敗しました。', 'error');
        }
      } catch(e) { showAlert('更新処理に失敗しました。', 'error'); }
    }

    // パスワードはいつでも変更可能
    async function handleChangePassword() {
      const newPassword = document.getElementById('profile-new-password').value;
      const confirmPassword = document.getElementById('profile-new-password-confirm').value;

      if(!newPassword || newPassword.length < 4) { showAlert('4文字以上のパスワードを入力してください。', 'error'); return; }
      if(newPassword !== confirmPassword) { showAlert('確認用パスワードが一致しません。', 'error'); return; }

      try {
        const res = await apiCall({ action: 'changePassword', email: currentUser.email, newPassword });
        if(res.success) {
          document.getElementById('profile-new-password').value = '';
          document.getElementById('profile-new-password-confirm').value = '';
          showAlert('パスワードを変更しました。');
        } else {
          showAlert(res.message || 'パスワード変更に失敗しました。', 'error');
        }
      } catch(e) { showAlert('パスワード変更処理に失敗しました。', 'error'); }
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('voice_memo_user');
      document.getElementById('main-content').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('main-nav').classList.add('hidden');
    }

    function showMainApp() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
      document.getElementById('main-nav').classList.remove('flex');
      document.getElementById('main-nav').classList.remove('hidden');
      document.getElementById('user-display').innerText = currentUser.nickname;
      
      if(currentUser.isAdmin) {
        document.getElementById('nav-admin').classList.remove('hidden');
        document.getElementById('btn-add-event').classList.remove('hidden');
      } else {
        document.getElementById('nav-admin').classList.add('hidden');
        document.getElementById('btn-add-event').classList.add('hidden');
      }
      switchTab('tab-memo');
    }

    // タブ切り替え
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      if(tabId === 'tab-timeline') fetchEvents();
      if(tabId === 'tab-profile') fillProfileForm();
    }

    function fillProfileForm() {
      if(!currentUser) return;
      document.getElementById('profile-email').value = currentUser.email || '';
      document.getElementById('profile-nickname').value = currentUser.nickname || '';
      document.getElementById('profile-sns').value = currentUser.sns || '';
      document.getElementById('profile-new-password').value = '';
      document.getElementById('profile-new-password-confirm').value = '';
    }

    // 録音コントロール
    async function toggleRecording() {
      const btn = document.getElementById('btn-record');
      const icon = document.getElementById('icon-record');
      const status = document.getElementById('recording-status');
      const timer = document.getElementById('recording-timer');

      if (!mediaRecorder || mediaRecorder.state === "inactive") {
        // 録音開始
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          audioChunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = processAudio;
          
          mediaRecorder.start();
          btn.classList.replace('bg-red-500', 'bg-gray-700');
          btn.classList.replace('hover:bg-red-600', 'hover:bg-gray-800');
          icon.className = "fa-solid fa-square text-2xl";
          status.innerText = "録音中...";
          status.classList.add('text-red-500');
          
          timer.classList.remove('hidden');
          recordingStartTime = Date.now();
          recordingTimerInterval = setInterval(() => {
            const diff = Date.now() - recordingStartTime;
            const m = String(Math.floor(diff / 60000)).padStart(2, '0');
            const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            timer.innerText = `${m}:${s}`;
          }, 1000);

        } catch (err) {
          showAlert('マイクのアクセス権限が必要です。', 'error');
        }
      } else {
        // 録音停止
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
        btn.classList.replace('bg-gray-700', 'bg-red-500');
        btn.classList.replace('hover:bg-gray-800', 'hover:bg-red-600');
        icon.className = "fa-solid fa-microphone";
        status.innerText = "音声解析中...";
        status.classList.remove('text-red-500');
        clearInterval(recordingTimerInterval);
        timer.classList.add('hidden');
      }
    }

    // 音声の擬似処理（AI要約生成のダミー）
    function processAudio() {
      setTimeout(() => {
        document.getElementById('memo-summary-text').value = 
          "【AIによる自動要約結果】\n・音声入力から重要なタスクを抽出しました。\n・次回のミーティングは来週月曜10時から開始します。\n・各自、進捗報告用の資料をドライブにアップロードしてください。";
        document.getElementById('recording-status').innerText = "停止中";
        autoFillObsidianFilename();
        showAlert('AI要約が完了しました！');
      }, 1500);
    }

    function clearMemo() {
      document.getElementById('memo-summary-text').value = '';
      showAlert('リセットしました。');
    }

    // 💡 方法1修正：画面上の入力から自由にVault（保管庫）名を選べるように対応
    function sendToObsidian(mode) {
      const inputVault = document.getElementById('obsidian-vaultname').value.trim();
      const vaultName = inputVault ? encodeURIComponent(inputVault) : '';
      const filename = encodeURIComponent(document.getElementById('obsidian-filename').value.trim() || generateTimestampedNoteName());
      let bodyText = document.getElementById('memo-summary-text').value;
      
      if(!bodyText) { showAlert('要約内容がありません。', 'error'); return; }
      
      const vaultParam = vaultName ? `vault=${vaultName}&` : '';
      let url = mode === 'new' 
        ? `obsidian://new?${vaultParam}file=${filename}&content=${encodeURIComponent(bodyText)}` 
        : `obsidian://advanced-uri?${vaultParam}filepath=${filename}&data=${encodeURIComponent('\n\n## 追記: ' + new Date().toLocaleString() + '\n' + bodyText)}&mode=append`;
      
      window.location.href = url;
    }

    // タイムライン・イベント操作関連
    function openEventForm() { document.getElementById('event-form-container').classList.remove('hidden'); }
    function closeEventForm() { document.getElementById('event-form-container').classList.add('hidden'); clearEventForm(); }
    function clearEventForm() { document.getElementById('event-id').value = ''; document.getElementById('event-title').value = ''; document.getElementById('event-desc').value = ''; }

    async function fetchEvents() {
      const container = document.getElementById('timeline-container');
      try {
        const res = await apiCall({ action: 'fetchEvents' });
        if(res.success) {
          if(res.events.length === 0) {
            container.innerHTML = `<p class="text-center text-gray-400 py-12">登録されているイベントはありません。</p>`;
            return;
          }
          let html = '';
          res.events.forEach(ev => {
            const isAdminRow = currentUser.isAdmin || currentUser.email === ev.creator;
            const isJoined = (ev.participants || []).some(p => p.nickname === currentUser.nickname);
            let partHtml = '';
            (ev.participants || []).forEach(p => {
              const safeNickname = escapeHtml(p.nickname);
              const safeSns = p.sns ? escapeHtml(p.sns) : '';
              partHtml += `<span class="bg-indigo-100 text-indigo-800 text-xs px-2.5 py-1 rounded-full font-medium inline-block mr-1 mb-1"><i class="fa-solid fa-user text-[10px]"></i> ${safeNickname}${safeSns ? ' ('+safeSns+')' : ''}</span>`;
            });
            if(!partHtml) partHtml = '<span class="text-xs text-gray-400 italic">参加希望者はまだいません</span>';

            html += `
              <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <div class="flex justify-between items-start">
                  <div>
                    <h4 class="text-base font-bold text-gray-900">${escapeHtml(ev.title)}</h4>
                    <p class="text-sm text-gray-600 mt-1">${escapeHtml(ev.desc)}</p>
                    <div class="text-xs text-gray-400 mt-2 flex gap-2">
                      <span>企画者: ${escapeHtml(ev.nickname)}</span>
                      ${ev.createdAt ? `<span>| 投稿: ${new Date(ev.createdAt).toLocaleString()}</span>` : ''}
                    </div>
                  </div>
                  <div class="flex gap-2 shrink-0">
                    ${isAdminRow ? `<button onclick="editEvent('${ev.id}','${escapeHtml(ev.title)}','${escapeHtml(ev.desc)}')" class="text-xs bg-gray-50 hover:bg-gray-100 px-2 py-1 rounded border border-gray-200">編集</button>` : ''}
                    ${isAdminRow ? `<button onclick="deleteEvent('${ev.id}')" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-2 py-1 rounded border border-red-100">削除</button>` : ''}
                  </div>
                </div>
                <div class="border-t pt-3 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                  <div>
                    <h5 class="text-xs font-bold text-gray-500 uppercase mb-1">参加メンバー (${(ev.participants || []).length}名)</h5>
                    <div class="flex flex-wrap">${partHtml}</div>
                  </div>
                  <button onclick="toggleJoinEvent('${ev.id}')" class="px-4 py-2 text-xs font-bold rounded-lg transition shrink-0 ${isJoined ? 'bg-red-100 hover:bg-red-200 text-red-700' : 'bg-indigo-600 hover:bg-indigo-700 text-white'}">
                    ${isJoined ? '参加キャンセル' : '参加表明する'}
                  </button>
                </div>
              </div>
            `;
          });
          container.innerHTML = html;
        }
      } catch(err) { container.innerHTML = `<p class="text-center text-red-500 py-6">タイムラインの取得に失敗しました。</p>`; }
    }

    async function toggleJoinEvent(eventId) {
      try {
        const res = await apiCall({ action: 'toggleJoin', eventId, email: currentUser.email, nickname: currentUser.nickname, sns: currentUser.sns });
        if(res.success) {
          showAlert(res.joined ? '参加表明しました。' : '参加を取り消しました。');
          fetchEvents();
        }
      } catch(err) { showAlert('処理に失敗しました。', 'error'); }
    }

    async function saveEvent() {
      const id = document.getElementById('event-id').value;
      const title = document.getElementById('event-title').value.trim();
      const desc = document.getElementById('event-desc').value.trim();
      if(!title) { showAlert('タイトルを入力してください。', 'error'); return; }

      try {
        const action = id ? 'updateEvent' : 'createEvent';
        const res = await apiCall({ action, id, title, desc, email: currentUser.email, nickname: currentUser.nickname });
        if(res.success) { showAlert('保存しました。'); closeEventForm(); fetchEvents(); }
      } catch(e) { showAlert('イベントの保存に失敗しました。', 'error'); }
    }

    function editEvent(id, title, desc) {
      openEventForm();
      document.getElementById('event-form-title').innerText = "イベントの編集";
      document.getElementById('event-id').value = id; 
      document.getElementById('event-title').value = title; 
      document.getElementById('event-desc').value = desc;
    }

    async function deleteEvent(id) {
      if(!confirm('本当に削除しますか？')) return;
      try {
        const res = await apiCall({ action: 'deleteEvent', id, email: currentUser.email, isAdmin: currentUser.isAdmin });
        if(res.success) { showAlert('削除しました。'); fetchEvents(); }
      } catch(err) { showAlert('削除に失敗しました。', 'error'); }
    }

    // 管理者アカウント新規作成
    async function createUserAccount() {
      const email = document.getElementById('admin-new-email').value.trim();
      const nickname = document.getElementById('admin-new-nickname').value.trim();
      if(!email || !nickname) { showAlert('メールアドレスとニックネームを入力してください。', 'error'); return; }
      
      try {
        const res = await apiCall({ action: 'createUser', email, nickname });
        if(res.success) {
          showAlert('アカウントを作成しました。');
          document.getElementById('admin-new-email').value = '';
          document.getElementById('admin-new-nickname').value = '';
        }
      } catch(e) { showAlert('アカウント作成に失敗しました。', 'error'); }
    }

    // トーストユーティリティ
    function showAlert(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      if (type === 'error') {
        toast.className = toast.className.replace(/bg-\w+-\d+/, '') + ' bg-red-600';
      } else {
        toast.className = toast.className.replace(/bg-\w+-\d+/, '') + ' bg-gray-900';
      }
      toast.classList.remove('translate-y-20', 'opacity-0');
      setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
    }

    function escapeHtml(str) {
      if(!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // 「memo」+ 年月日時分（例: memo202606200858）形式のノート名を生成
    function generateTimestampedNoteName() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const mi = String(now.getMinutes()).padStart(2, '0');
      return `memo${yyyy}${mm}${dd}${hh}${mi}`;
    }

    // 保存ノート名欄に自動でタイムスタンプ名をセット（手動編集があれば上書きしない）
    function autoFillObsidianFilename() {
      const input = document.getElementById('obsidian-filename');
      if(!input) return;
      input.value = generateTimestampedNoteName();
    }
  </script>
</body>
</html>
